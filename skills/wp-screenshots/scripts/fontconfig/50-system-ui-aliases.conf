<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  wp-screenshots / 50-system-ui-aliases.conf

  Alias Mac/Windows system font families to Inter so headless Chromium on
  Linux renders WordPress admin (which uses `-apple-system, BlinkMacSystemFont,
  "Segoe UI", system-ui, ...`) close to what a Mac shows. Without this,
  Linux falls through to Roboto / DejaVu and reviewers on Mac read the shots
  as "wrong" even though the layout is correct.

  Install:
    mkdir -p ~/.config/fontconfig/conf.d
    cp 50-system-ui-aliases.conf ~/.config/fontconfig/conf.d/
    fc-cache -f

  Verify:
    fc-match :family="system-ui"      # should resolve to Inter
    fc-match :family="-apple-system"  # should resolve to Inter
-->
<fontconfig>

  <alias binding="strong">
    <family>system-ui</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias binding="strong">
    <family>-apple-system</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias binding="strong">
    <family>BlinkMacSystemFont</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias binding="strong">
    <family>Segoe UI</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias binding="strong">
    <family>SF Pro Text</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias binding="strong">
    <family>SF Pro Display</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias binding="strong">
    <family>Helvetica Neue</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias binding="strong">
    <family>Helvetica</family>
    <prefer><family>Inter</family></prefer>
  </alias>

</fontconfig>
